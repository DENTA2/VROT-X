<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Game</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .game-container {
            width: 80%;
            max-width: 600px;
            margin-top: 60px;
        }
        
        .graph-container {
            height: 300px;
            background-color: #1e1e1e;
            border-radius: 10px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #4CAF50;
            transform-origin: left center;
            transform: scaleX(0);
        }
        
        .multiplier-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .timer {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .bet-panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
        }
        
        .bet-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .bet-amount {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333;
            border: none;
            color: white;
            border-radius: 5px;
        }
        
        .bet-button {
            width: 48%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .bet-button:disabled {
            background-color: #333;
            cursor: not-allowed;
        }
        
        .min-button, .max-button {
            width: 48%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .players-count {
            margin-top: 10px;
            text-align: center;
            color: #aaa;
        }
        
        .game-status {
            margin-top: 10px;
            text-align: center;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='index.html'">Назад</button>
    
    <div class="game-container">
        <div class="graph-container">
            <div class="graph-line" id="graphLine"></div>
            <div class="multiplier-display" id="multiplierDisplay">1.00x</div>
            <div class="timer" id="timer">0</div>
        </div>
        
        <div class="bet-panel">
            <div class="game-status" id="gameStatus">Ожидание игроков...</div>
            
            <input type="number" class="bet-amount" id="betAmount" placeholder="Сумма ставки" min="1" value="1">
            
            <div class="bet-controls">
                <button class="min-button" id="minButton">MIN (1р)</button>
                <button class="max-button" id="maxButton">MAX</button>
            </div>
            
            <button class="bet-button" id="placeBetButton">СТАВКА</button>
            <button class="bet-button" id="cashOutButton" disabled>ЗАБРАТЬ</button>
            
            <div class="players-count" id="playersCount">Игроков онлайн: 0</div>
        </div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCMos6Y7C-krTLuKCI4VJG-TFLo6QI--k8",
            authDomain: "vrot-x-7a48f.firebaseapp.com",
            databaseURL: "https://vrot-x-7a48f-default-rtdb.firebaseio.com",
            projectId: "vrot-x-7a48f",
            storageBucket: "vrot-x-7a48f.appspot.com",
            messagingSenderId: "622297225288",
            appId: "1:622297225288:web:5df6a5b02ffddedd96e07d"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Элементы DOM
        const graphLine = document.getElementById('graphLine');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const timerDisplay = document.getElementById('timer');
        const gameStatusDisplay = document.getElementById('gameStatus');
        const betAmountInput = document.getElementById('betAmount');
        const minButton = document.getElementById('minButton');
        const maxButton = document.getElementById('maxButton');
        const placeBetButton = document.getElementById('placeBetButton');
        const cashOutButton = document.getElementById('cashOutButton');
        const playersCountDisplay = document.getElementById('playersCount');

        // Переменные игры
        const currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);
        let gameState = 'waiting';
        let currentMultiplier = 1.0;
        let gameInterval;
        let betAmount = 1;
        let hasBet = false;
        let playersCount = 0;
        let crashPoint = 1.0;
        let gameStartTime = 0;
        let gameDuration = 0;
        let bettingEndTime = 0;

        // Слушатели событий
        minButton.addEventListener('click', () => {
            betAmountInput.value = 1;
        });

        maxButton.addEventListener('click', () => {
            betAmountInput.value = 1000; // Временное значение, замените на баланс пользователя
        });

        placeBetButton.addEventListener('click', placeBet);
        cashOutButton.addEventListener('click', cashOut);

        // Инициализация игры
        initGame();

        function initGame() {
            // Регистрируем игрока
            database.ref(`players/${currentUserId}`).set({
                joinedAt: Date.now(),
                active: true
            }).then(() => {
                // Проверяем состояние игры
                database.ref('gameState').on('value', (snapshot) => {
                    const state = snapshot.val();
                    if (state) {
                        updateGameState(state);
                    }
                });

                // Отслеживаем количество игроков
                database.ref('players').on('value', (snapshot) => {
                    const players = snapshot.val() || {};
                    const activePlayers = Object.values(players).filter(p => p.active);
                    playersCount = activePlayers.length;
                    playersCountDisplay.textContent = `Игроков онлайн: ${playersCount}`;

                    // Если нет активных игроков, сбрасываем игру
                    if (playersCount === 0) {
                        resetGame();
                    }
                });
            });

            // Удаляем игрока при закрытии страницы
            window.addEventListener('beforeunload', () => {
                database.ref(`players/${currentUserId}`).remove();
            });
        }

        function updateGameState(state) {
            gameState = state.currentState;
            currentMultiplier = state.currentMultiplier || 1.0;
            crashPoint = state.crashPoint || 1.0;
            gameStartTime = state.gameStartTime || 0;
            gameDuration = state.gameDuration || 0;
            bettingEndTime = state.bettingEndTime || 0;

            updateUI();

            switch (gameState) {
                case 'betting':
                    startBettingPhase();
                    break;
                case 'running':
                    startGameAnimation();
                    break;
                case 'crashed':
                    endGame();
                    break;
                default:
                    resetGame();
            }
        }

        function updateUI() {
            switch (gameState) {
                case 'waiting':
                    gameStatusDisplay.textContent = 'Ожидание игроков...';
                    placeBetButton.disabled = true;
                    cashOutButton.disabled = true;
                    break;
                case 'betting':
                    gameStatusDisplay.textContent = 'Прием ставок';
                    placeBetButton.disabled = false;
                    cashOutButton.disabled = true;
                    break;
                case 'running':
                    gameStatusDisplay.textContent = 'Игра идет';
                    placeBetButton.disabled = true;
                    cashOutButton.disabled = !hasBet;
                    break;
                case 'crashed':
                    gameStatusDisplay.textContent = `Крах на ${currentMultiplier.toFixed(2)}x`;
                    placeBetButton.disabled = true;
                    cashOutButton.disabled = true;
                    break;
            }
        }

        function startBettingPhase() {
            clearInterval(gameInterval);
            
            if (gameState !== 'betting') return;

            const updateBettingTimer = () => {
                const now = Date.now();
                const timeLeft = Math.max(0, Math.ceil((bettingEndTime - now) / 1000));
                timerDisplay.textContent = timeLeft;

                if (now >= bettingEndTime) {
                    startGameRound();
                }
            };

            updateBettingTimer();
            gameInterval = setInterval(updateBettingTimer, 200);
        }

        function startGameRound() {
            if (playersCount === 0) {
                resetGame();
                return;
            }

            // Генерируем точку краша (1.01 - 10.00)
            crashPoint = Math.max(1.01, Math.min(10, 1 + Math.pow(Math.random(), 2) * 9));
            
            gameStartTime = Date.now();
            gameDuration = Math.random() * 5000 + 3000; // 3-8 секунд
            
            database.ref('gameState').update({
                currentState: 'running',
                crashPoint: crashPoint,
                gameStartTime: gameStartTime,
                gameDuration: gameDuration,
                currentMultiplier: 1.0
            });
        }

        function startGameAnimation() {
            if (gameState !== 'running') return;

            clearInterval(gameInterval);
            
            const updateGame = () => {
                const now = Date.now();
                const elapsed = now - gameStartTime;
                const progress = Math.min(1, elapsed / gameDuration);
                
                // Нелинейное увеличение множителя
                currentMultiplier = 1 + (progress * progress * (crashPoint - 1));
                
                // Обновляем график
                graphLine.style.transform = `scaleX(${progress})`;
                multiplierDisplay.textContent = currentMultiplier.toFixed(2) + 'x';
                timerDisplay.textContent = currentMultiplier.toFixed(2) + 'x';
                
                // Обновляем в базе данных
                database.ref('gameState').update({
                    currentMultiplier: parseFloat(currentMultiplier.toFixed(2))
                });
                
                // Проверяем краш
                if (progress >= 1) {
                    endGame();
                }
            };

            updateGame();
            gameInterval = setInterval(updateGame, 16);
        }

        function endGame() {
            clearInterval(gameInterval);
            
            database.ref('gameState').update({
                currentState: 'crashed'
            });

            // Через 5 секунд начинаем новую игру, если есть игроки
            setTimeout(() => {
                if (playersCount > 0) {
                    startNewRound();
                } else {
                    resetGame();
                }
            }, 5000);
        }

        function startNewRound() {
            const bettingDuration = 15000; // 15 секунд на ставки
            bettingEndTime = Date.now() + bettingDuration;
            
            database.ref('gameState').set({
                currentState: 'betting',
                bettingEndTime: bettingEndTime,
                currentMultiplier: 1.0,
                crashPoint: 0,
                gameStartTime: 0,
                gameDuration: 0
            });
        }

        function resetGame() {
            clearInterval(gameInterval);
            
            database.ref('gameState').set({
                currentState: 'waiting',
                currentMultiplier: 1.0,
                crashPoint: 0,
                gameStartTime: 0,
                gameDuration: 0,
                bettingEndTime: 0
            });

            currentMultiplier = 1.0;
            graphLine.style.transform = 'scaleX(0)';
            multiplierDisplay.textContent = '1.00x';
            timerDisplay.textContent = '0';
            hasBet = false;
        }

        function placeBet() {
            betAmount = parseInt(betAmountInput.value) || 1;
            
            if (betAmount < 1) {
                alert('Минимальная ставка 1р');
                return;
            }
            
            // Здесь должна быть проверка баланса
            // Временно просто отмечаем ставку
            
            hasBet = true;
            placeBetButton.disabled = true;
            cashOutButton.disabled = false;
            
            // Добавляем ставку игрока
            database.ref(`bets/${currentUserId}`).set({
                amount: betAmount,
                cashedOut: false,
                multiplier: 0
            });
        }

        function cashOut() {
            if (!hasBet) return;
            
            const winAmount = Math.floor(betAmount * currentMultiplier);
            alert(`Вы успешно забрали ${winAmount}р!`);
            
            // Обновляем ставку игрока
            database.ref(`bets/${currentUserId}`).update({
                cashedOut: true,
                multiplier: currentMultiplier
            });
            
            hasBet = false;
            cashOutButton.disabled = true;
        }
    </script>
</body>
</html>
