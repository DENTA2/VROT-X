<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP-X Классик</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
        }
        
        .btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
        
        .btn-danger {
            background-color: #f44336;
        }
        
        .btn-danger:hover {
            background-color: #d32f2f;
        }
        
        .btn-primary {
            background-color: #008CBA;
        }
        
        .btn-primary:hover {
            background-color: #0077a3;
        }
        
        .btn-disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        
        .room-card {
            background-color: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            text-align: center;
        }
        
        .room-card.disabled {
            background-color: #333;
            color: #888;
        }
        
        .game-container {
            display: none;
            width: 100%;
            text-align: center;
        }
        
        .timer {
            font-size: 24px;
            margin: 20px 0;
        }
        
        .bet-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        
        .player-bet {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 5px;
            width: 45%;
        }
        
        .slot-machine {
            font-size: 48px;
            margin: 30px 0;
            height: 60px;
            overflow: hidden;
            position: relative;
        }
        
        .slot-digit {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: transform 1s ease-out;
        }
        
        .result {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
            color: #4CAF50;
            display: none;
        }
        
        .bet-input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
            text-align: center;
            margin-right: 10px;
            border-radius: 5px;
            border: none;
        }
        
        .increase-bet {
            margin-top: 10px;
        }
        
        .waiting-text {
            margin: 20px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-menu">
            <h1>UP-X Классик</h1>
            <div id="room-card" class="room-card">
                <h2>Классик - базовый</h2>
                <p id="players-count">1/2</p>
                <p>Стоимость участия: 1р</p>
                <button id="join-room-btn" class="btn">Войти в комнату</button>
                <button id="leave-room-btn" class="btn btn-danger" style="display: none;">Выйти из комнаты</button>
                <p id="room-status" class="waiting-text"></p>
            </div>
        </div>
        
        <div id="game-container" class="game-container">
            <h2>Игра началась!</h2>
            <div class="timer" id="timer">30</div>
            
            <div class="bet-container">
                <div class="player-bet" id="player1-bet">
                    <h3>Вы</h3>
                    <p id="your-bet">Ставка: 1р</p>
                </div>
                <div class="player-bet" id="player2-bet">
                    <h3>Соперник</h3>
                    <p id="opponent-bet">Ставка: 1р</p>
                </div>
            </div>
            
            <div class="increase-bet">
                <input type="number" id="bet-input" class="bet-input" value="1" min="1">
                <button id="increase-bet-btn" class="btn">Увеличить ставку</button>
            </div>
            
            <div class="slot-machine" id="slot-machine">
                <div class="slot-digit">0</div>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        // Инициализация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCMos6Y7C-krTLuKCI4VJG-TFLo6QI--k8",
            authDomain: "vrot-x-7a48f.firebaseapp.com",
            databaseURL: "https://vrot-x-7a48f-default-rtdb.firebaseio.com",
            projectId: "vrot-x-7a48f",
            storageBucket: "vrot-x-7a48f.firebasestorage.app",
            messagingSenderId: "622297225288",
            appId: "1:622297225288:web:5df6a5b02ffddedd96e07d"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Глобальные переменные
        const ROOM_ID = "classic_room";
        let currentUserId = localStorage.getItem('user_id') || 'user_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('user_id', currentUserId);
        let isInRoom = false;
        let isCreator = false;
        let gameInterval = null;
        let timeLeft = 30;
        let yourBet = 1;
        let opponentBet = 1;
        let gameState = 'waiting'; // waiting, betting, spinning, finished
        let roomRef = null;

        // DOM элементы
        const mainMenu = document.getElementById('main-menu');
        const gameContainer = document.getElementById('game-container');
        const roomCard = document.getElementById('room-card');
        const joinRoomBtn = document.getElementById('join-room-btn');
        const leaveRoomBtn = document.getElementById('leave-room-btn');
        const playersCount = document.getElementById('players-count');
        const roomStatus = document.getElementById('room-status');
        const timerElement = document.getElementById('timer');
        const yourBetElement = document.getElementById('your-bet');
        const opponentBetElement = document.getElementById('opponent-bet');
        const betInput = document.getElementById('bet-input');
        const increaseBetBtn = document.getElementById('increase-bet-btn');
        const slotMachine = document.getElementById('slot-machine');
        const resultElement = document.getElementById('result');

        // Инициализация комнаты
        function initRoom() {
            roomRef = database.ref('rooms/' + ROOM_ID);
            
            // Слушаем изменения в комнате
            roomRef.on('value', (snapshot) => {
                const room = snapshot.val();
                
                if (!room) {
                    // Комната не существует, создаем базовую структуру
                    roomRef.set({
                        player1: null,
                        player1Bet: 1,
                        player2: null,
                        player2Bet: 1,
                        status: 'waiting',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    return;
                }
                
                updateRoomUI(room);
                
                // Если мы в комнате, подписываемся на изменения игры
                if (isInRoom) {
                    handleGameState(room);
                }
            });
        }

        // Обновление интерфейса комнаты
        function updateRoomUI(room) {
            const players = [];
            if (room.player1) players.push(room.player1);
            if (room.player2) players.push(room.player2);
            
            const playersCountValue = players.length;
            playersCount.textContent = `${playersCountValue}/2`;
            
            // Блокируем комнату, если игра уже идет
            if (room.status !== 'waiting' && room.status !== 'waiting') {
                roomCard.classList.add('disabled');
                joinRoomBtn.classList.add('btn-disabled');
                joinRoomBtn.disabled = true;
                roomStatus.textContent = "Идет игра > Подождите";
            } else {
                roomCard.classList.remove('disabled');
                joinRoomBtn.classList.remove('btn-disabled');
                joinRoomBtn.disabled = false;
                roomStatus.textContent = playersCountValue === 0 ? "Комната свободна" : "Ожидание игроков";
            }
            
            // Показываем кнопку выхода, если мы в комнате
            if (isInRoom) {
                joinRoomBtn.style.display = 'none';
                leaveRoomBtn.style.display = 'inline-block';
                
                // Отключаем кнопку выхода, если уже 2 игрока
                leaveRoomBtn.disabled = playersCountValue === 2;
            } else {
                joinRoomBtn.style.display = 'inline-block';
                leaveRoomBtn.style.display = 'none';
            }
        }

        // Обработка состояний игры
        function handleGameState(room) {
            if (room.status === 'betting' && gameState !== 'betting') {
                // Начало игры
                gameState = 'betting';
                mainMenu.style.display = 'none';
                gameContainer.style.display = 'block';
                startGameTimer();
            } else if (room.status === 'spinning' && gameState !== 'spinning') {
                // Начало вращения
                gameState = 'spinning';
                startSpinning();
            } else if (room.status === 'finished' && gameState !== 'finished') {
                // Игра завершена
                gameState = 'finished';
                const winnerId = room.winner;
                showResult(winnerId);
            }
            
            // Обновляем ставки
            if (isCreator || room.player2 === currentUserId) {
                yourBet = room.player2Bet || 1;
                opponentBet = room.player1Bet || 1;
            } else {
                yourBet = room.player1Bet || 1;
                opponentBet = room.player2Bet || 1;
            }
            
            updateBetDisplay();
        }

        // Вход в комнату
        joinRoomBtn.addEventListener('click', () => {
            roomRef.transaction((room) => {
                if (!room) {
                    room = {
                        player1: null,
                        player1Bet: 1,
                        player2: null,
                        player2Bet: 1,
                        status: 'waiting',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    };
                }
                
                if (room.status !== 'waiting' && room.status !== 'waiting') return; // Не входим, если игра идет
                
                if (!room.player1) {
                    room.player1 = currentUserId;
                    room.player1Bet = 1;
                    isCreator = true;
                } else if (!room.player2 && room.player1 !== currentUserId) {
                    room.player2 = currentUserId;
                    room.player2Bet = 1;
                    isCreator = false;
                } else {
                    return; // Уже в комнате или комната полная
                }
                
                isInRoom = true;
                return room;
            });
        });

        // Выход из комнаты
        leaveRoomBtn.addEventListener('click', () => {
            roomRef.transaction((room) => {
                if (!room) return;
                
                if (room.player1 === currentUserId) {
                    room.player1 = null;
                    room.player1Bet = 1;
                    
                    // Если был второй игрок, он становится первым
                    if (room.player2) {
                        room.player1 = room.player2;
                        room.player1Bet = room.player2Bet;
                        room.player2 = null;
                        room.player2Bet = 1;
                    }
                } else if (room.player2 === currentUserId) {
                    room.player2 = null;
                    room.player2Bet = 1;
                }
                
                isInRoom = false;
                return room;
            });
        });

        // Увеличение ставки
        increaseBetBtn.addEventListener('click', () => {
            const newBet = parseInt(betInput.value);
            if (newBet >= 1 && gameState === 'betting') {
                yourBet = newBet;
                
                // Обновляем ставку в базе данных
                if (isCreator) {
                    roomRef.update({
                        player1Bet: yourBet
                    });
                } else {
                    roomRef.update({
                        player2Bet: yourBet
                    });
                }
            }
        });

        // Обновление отображения ставок
        function updateBetDisplay() {
            yourBetElement.textContent = `Ставка: ${yourBet}р`;
            opponentBetElement.textContent = `Ставка: ${opponentBet}р`;
        }

        // Запуск таймера игры
        function startGameTimer() {
            clearInterval(gameInterval);
            timeLeft = 30;
            timerElement.textContent = timeLeft;
            
            gameInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    // Переходим к вращению
                    roomRef.update({
                        status: 'spinning'
                    });
                }
            }, 1000);
        }

        // Запуск вращения слота
        function startSpinning() {
            clearInterval(gameInterval);
            timerElement.textContent = "Крутим...";
            
            // Анимация вращения
            const spinDuration = 8000 + Math.random() * 4000; // 8-12 секунд
            const startTime = Date.now();
            const endTime = startTime + spinDuration;
            
            const spinInterval = setInterval(() => {
                const currentTime = Date.now();
                const progress = (currentTime - startTime) / spinDuration;
                
                if (currentTime >= endTime) {
                    clearInterval(spinInterval);
                    finishSpinning();
                } else {
                    // Показываем случайное число
                    const randomNum = Math.floor(Math.random() * 100);
                    slotMachine.innerHTML = `<div class="slot-digit">${randomNum}</div>`;
                }
            }, 100);
        }

        // Завершение вращения и определение победителя
        function finishSpinning() {
            // Вычисляем победителя на основе ставок
            const totalBet = yourBet + opponentBet;
            const yourChance = yourBet / totalBet;
            const isWinner = Math.random() < yourChance;
            
            const winnerId = isWinner ? currentUserId : 
                            (isCreator ? roomRef.player2 : roomRef.player1);
            
            // Обновляем статус комнаты
            roomRef.update({
                status: 'finished',
                winner: winnerId,
                prize: totalBet
            });
        }

        // Показ результата
        function showResult(winnerId) {
            const isWinner = winnerId === currentUserId;
            
            if (isWinner) {
                resultElement.textContent = `Вы выиграли ${yourBet + opponentBet}р!`;
                resultElement.style.color = '#4CAF50';
            } else {
                resultElement.textContent = `Вы проиграли ${yourBet}р.`;
                resultElement.style.color = '#f44336';
            }
            
            resultElement.style.display = 'block';
            
            // Через 10 секунд сбрасываем комнату
            setTimeout(() => {
                roomRef.update({
                    player1: null,
                    player1Bet: 1,
                    player2: null,
                    player2Bet: 1,
                    status: 'waiting',
                    winner: null,
                    prize: null
                });
                
                gameContainer.style.display = 'none';
                mainMenu.style.display = 'block';
                resultElement.style.display = 'none';
                isInRoom = false;
            }, 10000);
        }

        // Очистка при выходе
        window.addEventListener('beforeunload', () => {
            if (isInRoom) {
                roomRef.transaction((room) => {
                    if (!room) return;
                    
                    if (room.player1 === currentUserId) {
                        room.player1 = null;
                        room.player1Bet = 1;
                        
                        if (room.player2) {
                            room.player1 = room.player2;
                            room.player1Bet = room.player2Bet;
                            room.player2 = null;
                            room.player2Bet = 1;
                        }
                    } else if (room.player2 === currentUserId) {
                        room.player2 = null;
                        room.player2Bet = 1;
                    }
                    
                    return room;
                });
            }
        });

        // Инициализация при загрузке
        initRoom();
    </script>
</body>
</html>
