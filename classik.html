<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP-X Классик</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .balance {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #333;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 12px 24px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn-bet {
            background-color: #333;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .btn-bet.active {
            background-color: #4CAF50;
            box-shadow: 0 0 15px #4CAF50;
        }
        
        .btn-danger {
            background-color: #f44336;
        }
        
        .room-card {
            background-color: #1e1e1e;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .room-card.disabled {
            background-color: #333;
            color: #888;
        }
        
        .game-container {
            display: none;
            width: 100%;
            text-align: center;
        }
        
        .timer-container {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            position: relative;
        }
        
        .timer-circle {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .timer-bg {
            fill: none;
            stroke: #333;
            stroke-width: 8;
        }
        
        .timer-progress {
            fill: none;
            stroke: #4CAF50;
            stroke-width: 8;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 1s linear;
        }
        
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }
        
        .bet-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .player-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid;
            object-fit: cover;
        }
        
        .avatar-you {
            border-color: #4CAF50;
        }
        
        .avatar-opponent {
            border-color: #f44336;
        }
        
        .slot-machine {
            width: 100%;
            height: 150px;
            position: relative;
            overflow: hidden;
            margin: 30px 0;
            border-radius: 10px;
            background-color: #1e1e1e;
        }
        
        .slot-content {
            display: flex;
            position: absolute;
            width: 200%;
            height: 100%;
            left: 0;
            transition: transform 0.1s;
        }
        
        .slot-avatar {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result {
            font-size: 28px;
            margin: 20px 0;
            font-weight: bold;
            display: none;
        }
        
        .win {
            color: #4CAF50;
        }
        
        .lose {
            color: #f44336;
        }
        
        .bet-amount {
            font-size: 18px;
            margin-top: 5px;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="balance" id="balance">1000р</div>
    
    <div class="container">
        <div id="main-menu">
            <h1>UP-X Классик</h1>
            <div id="room-card" class="room-card">
                <h2>Классик - базовый</h2>
                <p id="players-count">0/2</p>
                <p>Стоимость участия: 1р</p>
                <button id="join-room-btn" class="btn">Войти в комнату</button>
                <button id="leave-room-btn" class="btn btn-danger" style="display: none;">Выйти из комнаты</button>
                <p id="room-status" style="margin-top: 15px;"></p>
            </div>
        </div>
        
        <div id="game-container" class="game-container">
            <div class="timer-container">
                <svg class="timer-circle" viewBox="0 0 36 36">
                    <path class="timer-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path class="timer-progress" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                </svg>
                <div class="timer-text" id="timer">30</div>
            </div>
            
            <div class="player-info">
                <img src="https://i.imgur.com/JqYeYnR.png" class="avatar avatar-you" id="your-avatar">
                <div id="your-bet">Ваша ставка: <span class="bet-amount">1р</span></div>
            </div>
            
            <div class="player-info">
                <img src="https://i.imgur.com/3QZxJ9u.png" class="avatar avatar-opponent" id="opponent-avatar">
                <div id="opponent-bet">Ставка соперника: <span class="bet-amount">1р</span></div>
            </div>
            
            <div class="bet-container">
                <button class="btn btn-bet" data-bet="1">+1р</button>
                <button class="btn btn-bet" data-bet="5">+5р</button>
                <button class="btn btn-bet" data-bet="10">+10р</button>
            </div>
            
            <div class="slot-machine" id="slot-machine" style="display: none;">
                <div class="slot-content" id="slot-content">
                    <div class="slot-avatar">
                        <img src="https://i.imgur.com/JqYeYnR.png" class="avatar" style="width: 120px; height: 120px;">
                    </div>
                    <div class="slot-avatar">
                        <img src="https://i.imgur.com/3QZxJ9u.png" class="avatar" style="width: 120px; height: 120px;">
                    </div>
                </div>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        // Инициализация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCMos6Y7C-krTLuKCI4VJG-TFLo6QI--k8",
            authDomain: "vrot-x-7a48f.firebaseapp.com",
            databaseURL: "https://vrot-x-7a48f-default-rtdb.firebaseio.com",
            projectId: "vrot-x-7a48f",
            storageBucket: "vrot-x-7a48f.firebasestorage.app",
            messagingSenderId: "622297225288",
            appId: "1:622297225288:web:5df6a5b02ffddedd96e07d"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Глобальные переменные
        const ROOM_ID = "classic_room";
        let currentUserId = localStorage.getItem('user_id') || 'user_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('user_id', currentUserId);
        let currentBalance = parseInt(localStorage.getItem('balance')) || 1000;
        let isInRoom = false;
        let isCreator = false;
        let gameInterval = null;
        let timeLeft = 30;
        let yourBet = 1;
        let opponentBet = 1;
        let gameState = 'waiting';
        let roomRef = null;
        let spinInterval = null;

        // DOM элементы
        const mainMenu = document.getElementById('main-menu');
        const gameContainer = document.getElementById('game-container');
        const roomCard = document.getElementById('room-card');
        const joinRoomBtn = document.getElementById('join-room-btn');
        const leaveRoomBtn = document.getElementById('leave-room-btn');
        const playersCount = document.getElementById('players-count');
        const roomStatus = document.getElementById('room-status');
        const timerElement = document.getElementById('timer');
        const timerProgress = document.querySelector('.timer-progress');
        const yourBetElement = document.getElementById('your-bet');
        const opponentBetElement = document.getElementById('opponent-bet');
        const betButtons = document.querySelectorAll('.btn-bet');
        const slotMachine = document.getElementById('slot-machine');
        const slotContent = document.getElementById('slot-content');
        const resultElement = document.getElementById('result');
        const balanceElement = document.getElementById('balance');

        // Обновление баланса
        function updateBalance() {
            balanceElement.textContent = currentBalance + "р";
            localStorage.setItem('balance', currentBalance.toString());
        }

        // Инициализация комнаты
        function initRoom() {
            roomRef = database.ref('rooms/' + ROOM_ID);
            updateBalance();
            
            // Слушаем изменения в комнате
            roomRef.on('value', (snapshot) => {
                const room = snapshot.val();
                
                if (!room) {
                    // Комната не существует, создаем базовую структуру
                    roomRef.set({
                        player1: null,
                        player1Bet: 1,
                        player2: null,
                        player2Bet: 1,
                        status: 'waiting',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    return;
                }
                
                updateRoomUI(room);
                
                // Если мы в комнате, подписываемся на изменения игры
                if (isInRoom) {
                    handleGameState(room);
                }
            });
        }

        // Обновление интерфейса комнаты
        function updateRoomUI(room) {
            const players = [];
            if (room.player1) players.push(room.player1);
            if (room.player2) players.push(room.player2);
            
            const playersCountValue = players.length;
            playersCount.textContent = `${playersCountValue}/2`;
            
            // Блокируем комнату, если игра уже идет
            if (room.status !== 'waiting') {
                roomCard.classList.add('disabled');
                joinRoomBtn.classList.add('btn-disabled');
                joinRoomBtn.disabled = true;
                roomStatus.textContent = "Идет игра > Подождите";
            } else {
                roomCard.classList.remove('disabled');
                joinRoomBtn.classList.remove('btn-disabled');
                joinRoomBtn.disabled = false;
                roomStatus.textContent = playersCountValue === 0 ? "Комната свободна" : "Ожидание игроков";
            }
            
            // Показываем кнопку выхода, если мы в комнате
            const isPlayerInRoom = players.includes(currentUserId);
            if (isPlayerInRoom) {
                isInRoom = true;
                joinRoomBtn.style.display = 'none';
                leaveRoomBtn.style.display = 'inline-block';
                
                // Отключаем кнопку выхода, если уже 2 игрока
                leaveRoomBtn.disabled = playersCountValue === 2;
            } else {
                isInRoom = false;
                joinRoomBtn.style.display = 'inline-block';
                leaveRoomBtn.style.display = 'none';
            }
        }

        // Обработка состояний игры
        function handleGameState(room) {
            if (room.status === 'betting' && gameState !== 'betting') {
                // Начало игры
                gameState = 'betting';
                mainMenu.style.display = 'none';
                gameContainer.style.display = 'block';
                startGameTimer();
            } else if (room.status === 'spinning' && gameState !== 'spinning') {
                // Начало вращения
                gameState = 'spinning';
                startSpinning();
            } else if (room.status === 'finished' && gameState !== 'finished') {
                // Игра завершена
                gameState = 'finished';
                const winnerId = room.winner;
                showResult(winnerId);
            }
            
            // Обновляем ставки
            if (room.player1 === currentUserId) {
                yourBet = room.player1Bet || 1;
                opponentBet = room.player2Bet || 1;
                isCreator = true;
            } else if (room.player2 === currentUserId) {
                yourBet = room.player2Bet || 1;
                opponentBet = room.player1Bet || 1;
                isCreator = false;
            }
            
            updateBetDisplay();
        }

        // Вход в комнату
        joinRoomBtn.addEventListener('click', () => {
            if (currentBalance < 1) {
                alert("Недостаточно средств!");
                return;
            }
            
            roomRef.transaction((room) => {
                if (!room) {
                    room = {
                        player1: null,
                        player1Bet: 1,
                        player2: null,
                        player2Bet: 1,
                        status: 'waiting',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    };
                }
                
                if (room.status !== 'waiting') return; // Не входим, если игра идет
                
                if (!room.player1) {
                    room.player1 = currentUserId;
                    room.player1Bet = 1;
                    isCreator = true;
                } else if (!room.player2 && room.player1 !== currentUserId) {
                    room.player2 = currentUserId;
                    room.player2Bet = 1;
                    isCreator = false;
                } else {
                    return; // Уже в комнате или комната полная
                }
                
                // Если теперь 2 игрока, начинаем игру
                const playersCount = (room.player1 ? 1 : 0) + (room.player2 ? 1 : 0);
                if (playersCount === 2) {
                    room.status = 'betting';
                }
                
                isInRoom = true;
                currentBalance -= 1; // Списываем 1р за вход
                updateBalance();
                return room;
            });
        });

        // Выход из комнаты
        leaveRoomBtn.addEventListener('click', () => {
            roomRef.transaction((room) => {
                if (!room) return;
                
                let shouldRefund = false;
                
                if (room.player1 === currentUserId) {
                    room.player1 = null;
                    room.player1Bet = 1;
                    shouldRefund = true;
                    
                    // Если был второй игрок, он становится первым
                    if (room.player2) {
                        room.player1 = room.player2;
                        room.player1Bet = room.player2Bet;
                        room.player2 = null;
                        room.player2Bet = 1;
                    }
                } else if (room.player2 === currentUserId) {
                    room.player2 = null;
                    room.player2Bet = 1;
                    shouldRefund = true;
                }
                
                if (shouldRefund) {
                    currentBalance += 1; // Возвращаем 1р
                    updateBalance();
                }
                
                isInRoom = false;
                return room;
            });
        });

        // Увеличение ставки
        betButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameState !== 'betting') return;
                
                const betAmount = parseInt(btn.dataset.bet);
                if (currentBalance < betAmount) {
                    alert("Недостаточно средств!");
                    return;
                }
                
                // Обновляем ставку в базе данных
                if (isCreator) {
                    roomRef.update({
                        player1Bet: yourBet + betAmount
                    });
                } else {
                    roomRef.update({
                        player2Bet: yourBet + betAmount
                    });
                }
                
                currentBalance -= betAmount;
                updateBalance();
                
                // Подсветка кнопки
                betButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 300);
            });
        });

        // Обновление отображения ставок
        function updateBetDisplay() {
            document.querySelector('#your-bet .bet-amount').textContent = yourBet + "р";
            document.querySelector('#opponent-bet .bet-amount').textContent = opponentBet + "р";
        }

        // Запуск таймера игры
        function startGameTimer() {
            clearInterval(gameInterval);
            timeLeft = 30;
            timerElement.textContent = timeLeft;
            timerProgress.setAttribute('stroke-dashoffset', 0);
            
            gameInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                // Обновляем круг таймера
                const progress = (30 - timeLeft) / 30 * 100;
                timerProgress.setAttribute('stroke-dashoffset', 100 - progress);
                
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    // Переходим к вращению
                    roomRef.update({
                        status: 'spinning'
                    });
                }
            }, 1000);
        }

        // Запуск вращения слота
        function startSpinning() {
            slotMachine.style.display = 'block';
            clearInterval(spinInterval);
            
            const spinDuration = 3000 + Math.random() * 5000; // 3-8 секунд
            const startTime = Date.now();
            const endTime = startTime + spinDuration;
            let lastShift = 0;
            
            spinInterval = setInterval(() => {
                const currentTime = Date.now();
                const progress = (currentTime - startTime) / spinDuration;
                
                if (currentTime >= endTime) {
                    clearInterval(spinInterval);
                    finishSpinning();
                } else {
                    // Плавное замедление вращения
                    const speed = Math.max(0.1, 1 - progress * 0.9);
                    
                    if (currentTime - lastShift > 100 * speed) {
                        const shift = Math.random() > 0.5 ? 0 : 50;
                        slotContent.style.transform = `translateX(-${shift}%)`;
                        lastShift = currentTime;
                    }
                }
            }, 16);
        }

        // Завершение вращения и определение победителя
        function finishSpinning() {
            // Вычисляем победителя на основе ставок
            const totalBet = yourBet + opponentBet;
            const yourChance = yourBet / totalBet;
            const isWinner = Math.random() < yourChance;
            
            // Останавливаем на выбранном аватаре
            slotContent.style.transform = `translateX(-${isWinner ? 0 : 50}%)`;
            
            // Обновляем статус комнаты
            roomRef.update({
                status: 'finished',
                winner: isWinner ? currentUserId : (isCreator ? roomRef.player2 : roomRef.player1),
                prize: totalBet
            });
        }

        // Показ результата
        function showResult(winnerId) {
            const isWinner = winnerId === currentUserId;
            const winAmount = yourBet + opponentBet;
            
            if (isWinner) {
                resultElement.textContent = `Ты выиграл ${winAmount}р!`;
                resultElement.className = 'result win';
                currentBalance += winAmount;
            } else {
                resultElement.textContent = `Ты проиграл ${yourBet}р`;
                resultElement.className = 'result lose';
            }
            
            updateBalance();
            resultElement.style.display = 'block';
            
            // Через 5 секунд сбрасываем комнату
            setTimeout(() => {
                roomRef.update({
                    player1: null,
                    player1Bet: 1,
                    player2: null,
                    player2Bet: 1,
                    status: 'waiting',
                    winner: null,
                    prize: null
                });
                
                gameContainer.style.display = 'none';
                mainMenu.style.display = 'block';
                resultElement.style.display = 'none';
                slotMachine.style.display = 'none';
                isInRoom = false;
                gameState = 'waiting';
            }, 5000);
        }

        // Очистка при выходе
        window.addEventListener('beforeunload', () => {
            if (isInRoom && gameState !== 'finished') {
                roomRef.transaction((room) => {
                    if (!room) return;
                    
                    if (room.player1 === currentUserId) {
                        room.player1 = null;
                        room.player1Bet = 1;
                        
                        if (room.player2) {
                            room.player1 = room.player2;
                            room.player1Bet = room.player2Bet;
                            room.player2 = null;
                            room.player2Bet = 1;
                        }
                    } else if (room.player2 === currentUserId) {
                        room.player2 = null;
                        room.player2Bet = 1;
                    }
                    
                    if (!room.player1 && !room.player2) {
                        room.status = 'waiting';
                    }
                    
                    return room;
                });
            }
        });

        // Инициализация при загрузке
        initRoom();
    </script>
</body>
</html>
