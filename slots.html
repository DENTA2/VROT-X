<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слот-автомат</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: #0a0a12;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .back-button {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        
        .back-button::before {
            content: "←";
            margin-right: 8px;
        }
        
        .title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .balance-container {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
            color: #ffd700;
        }
        
        .balance-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        
        .slot-machine {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        .machine-body {
            background: #1a1a2a;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            border: 5px solid #2a2a3a;
            position: relative;
            overflow: hidden;
        }
        
        .machine-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to bottom, 
                rgba(255, 215, 0, 0.1), 
                transparent);
            pointer-events: none;
            z-index: 1;
        }
        
        .machine-screen {
            background: #0e0e1a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.8),
                0 5px 20px rgba(0, 0, 0, 0.6);
            border: 2px solid #2a2a3a;
            position: relative;
            overflow: hidden;
        }
        
        .slots-container {
            position: relative;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 150px;
            position: relative;
            z-index: 2;
        }
        
        .slot {
            width: 100px;
            height: 150px;
            background: #151525;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 5px 10px rgba(0, 0, 0, 0.4);
            border: 2px solid #2a2a4a;
        }
        
        .slot-reel {
            position: absolute;
            width: 100%;
            height: 500%;
            top: 0;
            left: 0;
            transition: top 8s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        
        .slot-item {
            width: 100%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .slot-item.seven {
            background: linear-gradient(135deg, #ff5e62, #ff9966);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            box-shadow: 
                0 0 20px rgba(255, 94, 98, 0.7),
                inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: sevenGlow 2s infinite alternate;
        }
        
        @keyframes sevenGlow {
            0% { box-shadow: 0 0 20px rgba(255, 94, 98, 0.7); }
            100% { box-shadow: 0 0 30px rgba(255, 94, 98, 0.9), 0 0 40px rgba(255, 94, 98, 0.5); }
        }
        
        .slot-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.8) 0%,
                transparent 20%,
                transparent 80%,
                rgba(0, 0, 0, 0.8) 100%
            );
            pointer-events: none;
            z-index: 3;
        }
        
        .slot-highlight {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 30%;
            transform: translateY(-50%);
            background: rgba(255, 215, 0, 0.1);
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }
        
        .bet-controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        .bet-btn {
            padding: 10px 15px;
            background: #252535;
            color: #ffd700;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 70px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .bet-btn:hover {
            background: #353545;
        }
        
        .bet-btn.active {
            background: linear-gradient(135deg, #ff9a00, #ff5e00);
            color: white;
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .spin-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff9a00, #ff5e00);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 250px;
            margin-top: 10px;
            box-shadow: 
                0 5px 15px rgba(255, 94, 0, 0.4),
                inset 0 -3px 5px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .spin-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 45%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 55%
            );
            transform: rotate(30deg);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 20px rgba(255, 94, 0, 0.6),
                inset 0 -3px 5px rgba(0, 0, 0, 0.2);
        }
        
        .spin-btn:hover::before {
            left: 100%;
        }
        
        .spin-btn:active {
            transform: translateY(0);
        }
        
        .spin-btn:disabled {
            background: #353545;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
            color: #777;
        }
        
        .spin-btn:disabled::before {
            display: none;
        }
        
        .result-message {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
        }
        
        .result-message.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .win-animation {
            animation: winPulse 0.5s ease-in-out;
        }
        
        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .slot-win {
            animation: slotWin 0.5s ease-in-out 3;
        }
        
        @keyframes slotWin {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px gold; }
            50% { transform: scale(1.1); box-shadow: 0 0 20px gold; }
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffd700;
            font-size: 20px;
            z-index: 1000;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            border-top-color: #ff9a00;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 500px) {
            .slot {
                width: 80px;
                height: 120px;
            }
            
            .slot-item {
                font-size: 40px;
            }
            
            .slot-item.seven {
                width: 60px;
                height: 60px;
            }
            
            .bet-btn {
                padding: 8px 12px;
                font-size: 14px;
                min-width: 60px;
            }
            
            .spin-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-button" id="backButton">Назад</button>
        <div class="title">Слот-автомат</div>
        <div class="balance-container">
            <span class="balance-icon">💰</span>
            <span id="balance">0.00</span> ₽
        </div>
    </div>
    
    <div class="slot-machine">
        <div class="machine-body">
            <div class="machine-screen">
                <div class="slots-container">
                    <div class="slots">
                        <div class="slot" id="slot1">
                            <div class="slot-reel" id="reel1"></div>
                            <div class="slot-highlight"></div>
                            <div class="slot-mask"></div>
                        </div>
                        <div class="slot" id="slot2">
                            <div class="slot-reel" id="reel2"></div>
                            <div class="slot-highlight"></div>
                            <div class="slot-mask"></div>
                        </div>
                        <div class="slot" id="slot3">
                            <div class="slot-reel" id="reel3"></div>
                            <div class="slot-highlight"></div>
                            <div class="slot-mask"></div>
                        </div>
                    </div>
                </div>
                
                <div class="result-message" id="resultMessage"></div>
            </div>
            
            <div class="controls">
                <div class="bet-controls">
                    <button class="bet-btn" data-bet="5">5 ₽</button>
                    <button class="bet-btn" data-bet="10">10 ₽</button>
                    <button class="bet-btn" data-bet="25">25 ₽</button>
                    <button class="bet-btn active" data-bet="50">50 ₽</button>
                    <button class="bet-btn" data-bet="100">100 ₽</button>
                    <button class="bet-btn" data-bet="1000">1000 ₽</button>
                </div>
                
                <button class="spin-btn" id="spinBtn">Крутить</button>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>Загрузка...</div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCMos6Y7C-krTLuKCI4VJG-TFLo6QI--k8",
            authDomain: "vrot-x-7a48f.firebaseapp.com",
            databaseURL: "https://vrot-x-7a48f-default-rtdb.firebaseio.com",
            projectId: "vrot-x-7a48f",
            storageBucket: "vrot-x-7a48f.firebasestorage.app",
            messagingSenderId: "622297225288",
            appId: "1:622297225288:web:5df6a5b02ffddedd96e07d"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Символы для слотов
        const symbols = [
            { icon: '🍒', weight: 30 },
            { icon: '🍋', weight: 25 },
            { icon: '🍊', weight: 20 },
            { icon: '🍇', weight: 15 },
            { icon: '🍉', weight: 7 },
            { icon: '7', weight: 3, special: true },
            { icon: '💰', weight: 1, special: true }
        ];
        
        // Глобальные переменные
        let userId = null;
        let userRef = null;
        let currentBet = 50;
        let balance = 0;
        let isSpinning = false;
        let isFirebaseConnected = false;
        let reels = [];
        let stopOrder = [];
        
        // Элементы DOM
        const balanceElement = document.getElementById('balance');
        const spinBtn = document.getElementById('spinBtn');
        const resultMessage = document.getElementById('resultMessage');
        const backButton = document.getElementById('backButton');
        const betButtons = document.querySelectorAll('.bet-btn');
        const reelElements = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const slotElements = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        const loadingElement = document.getElementById('loading');
        
        // Инициализация игры
        function initGame() {
            // Создаем символы на барабанах
            reels = [[], [], []];
            
            for (let i = 0; i < 3; i++) {
                reelElements[i].innerHTML = '';
                
                // Добавляем 20 символов на каждый барабан (10 сверху, 10 снизу)
                for (let j = 0; j < 20; j++) {
                    const symbolIndex = Math.floor(Math.random() * symbols.length);
                    const symbol = symbols[symbolIndex];
                    
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    if (symbol.special && symbol.icon === '7') {
                        const sevenElement = document.createElement('div');
                        sevenElement.className = 'slot-item seven';
                        sevenElement.textContent = '7';
                        item.appendChild(sevenElement);
                    } else {
                        item.textContent = symbol.icon;
                    }
                    
                    reelElements[i].appendChild(item);
                    reels[i].push(symbol);
                }
                
                // Устанавливаем начальную позицию (чтобы центральный символ был виден)
                reelElements[i].style.top = '-400%';
            }
        }
        
        // Получаем или создаем ID пользователя
        function getOrCreateUserId() {
            let localUserId = localStorage.getItem('vrot-x_userId');
            if (!localUserId) {
                localUserId = 'local_' + Math.random().toString(36).substr(2, 12) + 
                            '_' + Date.now().toString(36);
                localStorage.setItem('vrot-x_userId', localUserId);
            }
            return localUserId;
        }
        
        // Инициализация пользователя
        async function initUser() {
            userId = getOrCreateUserId();
            userRef = database.ref('users/' + userId);
            
            try {
                // Проверяем соединение с Firebase
                await database.ref('.info/connected').once('value');
                isFirebaseConnected = true;
                
                // Загружаем данные пользователя
                const snapshot = await userRef.once('value');
                
                if (!snapshot.exists()) {
                    // Создаем нового пользователя
                    await userRef.set({
                        balance: 1000.00,
                        created_at: new Date().toISOString(),
                        last_active: new Date().toISOString(),
                        is_local_user: true
                    });
                    balance = 1000.00;
                } else {
                    // Получаем баланс существующего пользователя
                    const userData = snapshot.val();
                    balance = userData.balance || 0.00;
                }
                
                updateUI();
                loadingElement.style.display = 'none';
                
                // Слушаем изменения баланса в реальном времени
                userRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.balance !== undefined) {
                        balance = parseFloat(data.balance.toFixed(2));
                        updateUI();
                    }
                });
                
            } catch (error) {
                console.error("Ошибка подключения к Firebase:", error);
                // Работаем в оффлайн режиме
                balance = parseFloat(localStorage.getItem('vrot-x_offlineBalance') || 1000.00);
                updateUI();
                loadingElement.querySelector('div:last-child').textContent = "Оффлайн режим";
                setTimeout(() => {
                    loadingElement.style.display = 'none';
                }, 1500);
            }
        }
        
        // Обновление интерфейса
        function updateUI() {
            balanceElement.textContent = balance.toFixed(2);
            spinBtn.disabled = isSpinning || balance < currentBet;
            
            // Обновляем активную кнопку ставки
            betButtons.forEach(btn => {
                const btnBet = parseInt(btn.dataset.bet);
                btn.classList.toggle('active', btnBet === currentBet);
                btn.disabled = isSpinning || balance < btnBet;
            });
        }
        
        // Вращение слотов
        function spin() {
            if (isSpinning || balance < currentBet) return;
            
            isSpinning = true;
            resultMessage.classList.remove('show');
            updateUI();
            
            // Вычитаем ставку
            balance = parseFloat((balance - currentBet).toFixed(2));
            saveBalance();
            
            // Генерируем последовательность остановки барабанов
            stopOrder = [0, 1, 2];
            
            // Запускаем вращение всех барабанов
            startAllReels();
            
            // Останавливаем барабаны по очереди с задержкой
            stopReelsSequentially();
        }
        
        // Запуск всех барабанов
        function startAllReels() {
            for (let i = 0; i < 3; i++) {
                startReel(i);
            }
        }
        
        // Запуск одного барабана
        function startReel(index) {
            const reel = reelElements[index];
            reel.style.transition = 'none';
            reel.style.top = '-400%';
            
            // Небольшая задержка для плавного старта
            setTimeout(() => {
                reel.style.transition = 'top 3s cubic-bezier(0.1, 0.8, 0.2, 1)';
                reel.style.top = '0%';
            }, 50);
        }
        
        // Последовательная остановка барабанов
        function stopReelsSequentially() {
            if (stopOrder.length === 0) {
                // Все барабаны остановлены
                checkWin();
                isSpinning = false;
                updateUI();
                return;
            }
            
            const reelIndex = stopOrder.shift();
            const delay = reelIndex === 0 ? 1500 : reelIndex === 1 ? 2500 : 3500;
            
            setTimeout(() => {
                stopReel(reelIndex);
                stopReelsSequentially();
            }, delay);
        }
        
        // Остановка барабана
        function stopReel(index) {
            const reel = reelElements[index];
            const targetPosition = calculateStopPosition(index);
            
            reel.style.transition = 'top 1.5s cubic-bezier(0.2, 0.8, 0.4, 1)';
            reel.style.top = targetPosition;
            
            // Эффект при остановке
            slotElements[index].classList.add('slot-win');
            setTimeout(() => {
                slotElements[index].classList.remove('slot-win');
            }, 1500);
        }
        
        // Расчет позиции остановки для выпадения случайного символа
        function calculateStopPosition(index) {
            // Выбираем случайный символ (с учетом весов)
            const symbol = getRandomSymbol();
            
            // Находим позицию этого символа на барабане
            const symbolIndex = reels[index].findIndex(s => s.icon === symbol.icon);
            
            // Рассчитываем позицию для остановки (чтобы символ оказался в центре)
            const itemHeight = 20; // 20% высоты
            const centerPosition = 40; // 40% от верха (центр)
            const targetTop = centerPosition - (symbolIndex * itemHeight) - itemHeight;
            
            return `${targetTop}%`;
        }
        
        // Выбор случайного символа с учетом весов
        function getRandomSymbol() {
            let random = Math.random() * symbols.reduce((sum, s) => sum + s.weight, 0);
            for (const symbol of symbols) {
                if (random < symbol.weight) {
                    return symbol;
                }
                random -= symbol.weight;
            }
            return symbols[0];
        }
        
        // Проверка выигрышной комбинации
        function checkWin() {
            const results = [];
            
            // Получаем центральные символы каждого барабана
            for (let i = 0; i < 3; i++) {
                const reelTop = parseFloat(reelElements[i].style.top);
                const centerIndex = Math.floor((40 - reelTop) / 20);
                results.push(reels[i][centerIndex].icon);
            }
            
            // Определяем выигрыш
            let winAmount = 0;
            let winMessage = '';
            
            // Все три одинаковых - джекпот
            if (results[0] === results[1] && results[1] === results[2]) {
                switch(results[0]) {
                    case '🍒': winAmount = currentBet * 5; break;
                    case '🍋': winAmount = currentBet * 7; break;
                    case '🍊': winAmount = currentBet * 10; break;
                    case '🍇': winAmount = currentBet * 15; break;
                    case '🍉': winAmount = currentBet * 20; break;
                    case '7': winAmount = currentBet * 50; break;
                    case '💰': winAmount = currentBet * 100; break;
                }
                winMessage = `ДЖЕКПОТ! +${winAmount.toFixed(2)} ₽`;
            } 
            // Два одинаковых (кроме вишенки)
            else if ((results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) && 
                    !(results[0] === '🍒' && results[1] === '🍒')) {
                const matchingSymbol = results[0] === results[1] ? results[0] : results[2];
                
                switch(matchingSymbol) {
                    case '🍋': winAmount = currentBet * 2; break;
                    case '🍊': winAmount = currentBet * 3; break;
                    case '🍇': winAmount = currentBet * 4; break;
                    case '🍉': winAmount = currentBet * 5; break;
                    case '7': winAmount = currentBet * 10; break;
                    case '💰': winAmount = currentBet * 20; break;
                    default: winAmount = currentBet * 1.5;
                }
                winMessage = `Выигрыш! +${winAmount.toFixed(2)} ₽`;
            }
            // Две вишенки
            else if ((results[0] === '🍒' && results[1] === '🍒') || 
                    (results[1] === '🍒' && results[2] === '🍒') || 
                    (results[0] === '🍒' && results[2] === '🍒')) {
                winAmount = currentBet * 1.2;
                winMessage = `Выигрыш! +${winAmount.toFixed(2)} ₽`;
            } else {
                winMessage = 'Попробуйте еще раз!';
            }
            
            // Обновляем баланс, если есть выигрыш
            if (winAmount > 0) {
                balance = parseFloat((balance + winAmount).toFixed(2));
                saveBalance();
            }
            
            // Показываем сообщение
            resultMessage.textContent = winMessage;
            resultMessage.classList.add('show');
            resultMessage.classList.add('win-animation');
            setTimeout(() => {
                resultMessage.classList.remove('win-animation');
            }, 1000);
            
            // Перезагружаем барабаны для следующего вращения
            initGame();
        }
        
        // Сохранение баланса
        function saveBalance() {
            if (isFirebaseConnected) {
                userRef.update({
                    balance: balance,
                    last_active: new Date().toISOString()
                });
            } else {
                // Сохраняем в localStorage для оффлайн режима
                localStorage.setItem('vrot-x_offlineBalance', balance);
            }
            
            updateUI();
        }
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            // Обработчики кнопок ставок
            betButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    currentBet = parseInt(btn.dataset.bet);
                    updateUI();
                });
            });
            
            // Обработчик кнопки вращения
            spinBtn.addEventListener('click', spin);
            
            // Обработчик кнопки "Назад"
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            
            // Инициализация игры и пользователя
            initGame();
            initUser();
            
            // Гарантированное закрытие загрузчика
            setTimeout(() => {
                if (loadingElement.style.display !== 'none') {
                    loadingElement.style.display = 'none';
                }
            }, 5000);
        });
    </script>
</body>
</html>
