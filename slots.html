<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой автомат</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        
        .balance-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
        }
        
        .slot-machine {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 80px;
            background-color: #222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .slots {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .slot {
            width: 100px;
            height: 150px;
            background-color: #444;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            overflow: hidden;
            position: relative;
        }
        
        .slot-item {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .bet-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .spin-btn {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        
        .spin-btn:hover {
            background-color: #45a049;
        }
        
        .bet-btn {
            background-color: #555;
            color: white;
        }
        
        .bet-btn.active {
            background-color: #4CAF50;
        }
        
        .win-message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="balance-container">
        Баланс: <span id="balance">0</span> ₽
    </div>
    
    <div class="slot-machine">
        <div class="slots">
            <div class="slot" id="slot1">
                <div class="slot-item">🍒</div>
            </div>
            <div class="slot" id="slot2">
                <div class="slot-item">🍒</div>
            </div>
            <div class="slot" id="slot3">
                <div class="slot-item">🍒</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="bet-controls">
                <button class="bet-btn" data-bet="10">10 ₽</button>
                <button class="bet-btn" data-bet="50">50 ₽</button>
                <button class="bet-btn active" data-bet="100">100 ₽</button>
                <button class="bet-btn" data-bet="500">500 ₽</button>
            </div>
            
            <button class="spin-btn" id="spinBtn">Вращать</button>
            
            <div class="win-message" id="winMessage"></div>
        </div>
    </div>

    <script>
        // Инициализация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCMos6Y7C-krTLuKCI4VJG-TFLo6QI--k8",
            authDomain: "vrot-x-7a48f.firebaseapp.com",
            databaseURL: "https://vrot-x-7a48f-default-rtdb.firebaseio.com",
            projectId: "vrot-x-7a48f",
            storageBucket: "vrot-x-7a48f.firebasestorage.app",
            messagingSenderId: "622297225288",
            appId: "1:622297225288:web:5df6a5b02ffddedd96e07d"
        };

        // Инициализируем Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Символы для слотов
        const symbols = ['🍒', '🍋', '🍊', '🍇', '🍉', '7', '💰'];
        
        // Текущие значения
        let currentBet = 100;
        let balance = 0;
        let isSpinning = false;
        
        // Получаем элементы DOM
        const balanceElement = document.getElementById('balance');
        const spinBtn = document.getElementById('spinBtn');
        const winMessage = document.getElementById('winMessage');
        const betButtons = document.querySelectorAll('.bet-btn');
        const slots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        
        // Устанавливаем обработчики событий
        betButtons.forEach(button => {
            button.addEventListener('click', () => {
                currentBet = parseInt(button.dataset.bet);
                betButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
            });
        });
        
        spinBtn.addEventListener('click', spin);
        
        // Загружаем баланс из Firebase
        function loadBalance() {
            // Здесь нужно указать путь к данным пользователя
            // Временно используем тестовый путь
            const userId = 'test_user';
            const userRef = database.ref('users/' + userId);
            
            userRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.balance) {
                    balance = data.balance;
                    balanceElement.textContent = balance;
                } else {
                    // Если пользователя нет, создаем с начальным балансом
                    balance = 1000;
                    userRef.set({ balance: balance });
                    balanceElement.textContent = balance;
                }
            });
        }
        
        // Функция вращения
        function spin() {
            if (isSpinning) return;
            if (balance < currentBet) {
                winMessage.textContent = 'Недостаточно средств!';
                return;
            }
            
            isSpinning = true;
            winMessage.textContent = '';
            
            // Вычитаем ставку
            balance -= currentBet;
            updateBalance();
            
            // Анимация вращения
            const spins = [];
            for (let i = 0; i < 3; i++) {
                spins[i] = spinSlot(i);
            }
            
            // Проверяем результаты после остановки
            Promise.all(spins).then(results => {
                checkWin(results);
                isSpinning = false;
            });
        }
        
        // Вращение одного слота
        function spinSlot(slotIndex) {
            return new Promise(resolve => {
                const slot = slots[slotIndex];
                const duration = 2000 + Math.random() * 1000; // 2-3 секунды
                const startTime = Date.now();
                
                // Создаем элементы для анимации
                for (let i = 0; i < 5; i++) {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    slot.appendChild(item);
                }
                
                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeProgress = easeOutCubic(progress);
                    
                    // Перемещаем элементы
                    const items = slot.querySelectorAll('.slot-item');
                    items.forEach((item, index) => {
                        const yPos = -100 * (index - easeProgress * (items.length - 1));
                        item.style.transform = `translateY(${yPos}%)`;
                    });
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // Оставляем только центральный элемент
                        const centerIndex = Math.floor(items.length / 2);
                        const result = items[centerIndex].textContent;
                        
                        // Очищаем слот
                        while (slot.firstChild) {
                            slot.removeChild(slot.firstChild);
                        }
                        
                        // Добавляем результат
                        const resultItem = document.createElement('div');
                        resultItem.className = 'slot-item';
                        resultItem.textContent = result;
                        slot.appendChild(resultItem);
                        
                        resolve(result);
                    }
                }
                
                animate();
            });
        }
        
        // Проверка выигрыша
        function checkWin(results) {
            // Все три одинаковых - джекпот
            if (results[0] === results[1] && results[1] === results[2]) {
                const winAmount = currentBet * 10;
                balance += winAmount;
                winMessage.textContent = `Джекпот! +${winAmount} ₽`;
            } 
            // Два одинаковых - маленький выигрыш
            else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                const winAmount = currentBet * 2;
                balance += winAmount;
                winMessage.textContent = `Выигрыш! +${winAmount} ₽`;
            } else {
                winMessage.textContent = 'Повезет в следующий раз!';
            }
            
            updateBalance();
        }
        
        // Обновление баланса в Firebase
        function updateBalance() {
            balanceElement.textContent = balance;
            
            const userId = 'test_user';
            database.ref('users/' + userId).update({
                balance: balance
            });
        }
        
        // Функция для плавного замедления анимации
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }
        
        // Загружаем баланс при загрузке страницы
        window.addEventListener('load', loadBalance);
    </script>
</body>
</html>
