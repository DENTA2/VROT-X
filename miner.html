<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINER</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            user-select: none;
        }
        
        body {
            background-color: #121212;
            color: white;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .back-button {
            color: #1a73e8;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 0;
        }
        
        .logo {
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-grow: 1;
            text-align: center;
        }
        
        .balance-container {
            border: 1px solid #1a73e8;
            border-radius: 12px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
        }
        
        .balance {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        
        .cell.revealed {
            background: #4caf50;
        }
        
        .cell.bomb {
            background: #f44336;
        }
        
        .multipliers-container {
            overflow-x: auto;
            margin-bottom: 15px;
            padding: 10px 0;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .multipliers-track {
            display: inline-flex;
            gap: 8px;
        }
        
        .multiplier {
            padding: 8px 12px;
            border-radius: 5px;
            background: #1e1e1e;
            color: #888;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .multiplier-value {
            font-size: 14px;
        }
        
        .multiplier-step {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        .multiplier.current {
            background: #333;
            color: white;
        }
        
        .multiplier.win {
            background: #2e7d32;
            color: white;
        }
        
        .multiplier.lose {
            background: #c62828;
            color: white;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }
        
        .bet-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .bet-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .bet-title {
            color: #1a73e8;
            font-weight: bold;
            white-space: nowrap;
            margin-right: 5px;
        }
        
        .bet-amount {
            flex: 1;
            position: relative;
        }
        
        .bet-amount input {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #1a73e8;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        
        .bet-buttons {
            display: flex;
            gap: 8px;
        }
        
        .bet-buttons button {
            padding: 8px 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .mines-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .mines-title {
            color: #1a73e8;
            font-weight: bold;
            white-space: nowrap;
            margin-right: 5px;
        }
        
        .mines-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }
        
        .mines-buttons button {
            padding: 8px 12px;
            background: #1e1e1e;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .mines-buttons button.active {
            background: #1a73e8;
        }
        
        .action-button {
            padding: 15px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .action-button:disabled {
            background: #333;
            color: #888;
            cursor: not-allowed;
        }
        
        .no-balance {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.9);
            color: #f44336;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #f44336;
            text-align: center;
            z-index: 1001;
            width: 80%;
            max-width: 300px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="no-balance" id="noBalance" style="display: none;">Недостаточный баланс для игры</div>

    <div class="header">
        <div class="back-button" onclick="goBack()">← Назад</div>
        <div class="logo">MINER</div>
        <div class="balance-container">
            <div class="balance" id="balance">0.00 ₽</div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="multipliers-container">
        <div class="multipliers-track" id="multipliersTrack"></div>
    </div>

    <div class="controls">
        <div class="bet-controls">
            <div class="bet-row">
                <div class="bet-title">Ставка:</div>
                <div class="bet-amount">
                    <input type="number" id="betAmount" min="1" step="1" value="1" max="999999">
                </div>
                <div class="bet-buttons">
                    <button id="minBet">MIN</button>
                    <button id="halfBet">1/2</button>
                    <button id="doubleBet">2x</button>
                    <button id="maxBet">MAX</button>
                </div>
            </div>
        </div>

        <div class="mines-control">
            <div class="mines-title">Бомбы:</div>
            <div class="mines-buttons">
                <button data-mines="2">2</button>
                <button data-mines="3">3</button>
                <button data-mines="5" class="active">5</button>
                <button data-mines="10">10</button>
                <button data-mines="24">24</button>
            </div>
        </div>

        <button class="action-button" id="actionButton">
            Играть
        </button>
    </div>

    <script>
        // Глобальные переменные
        let balance = 0;
        let currentBet = 0;
        let minesCount = 5;
        let gameActive = false;
        let revealedCells = 0;
        let bombPositions = [];
        let currentMultiplier = 1.0;
        let multiplierHistory = [];

        // Элементы интерфейса
        const noBalanceElement = document.getElementById('noBalance');
        const balanceElement = document.getElementById('balance');
        const gameBoard = document.getElementById('gameBoard');
        const multipliersTrack = document.getElementById('multipliersTrack');
        const betAmountInput = document.getElementById('betAmount');
        const minBetButton = document.getElementById('minBet');
        const halfBetButton = document.getElementById('halfBet');
        const doubleBetButton = document.getElementById('doubleBet');
        const maxBetButton = document.getElementById('maxBet');
        const minesButtons = document.querySelectorAll('.mines-buttons button');
        const actionButton = document.getElementById('actionButton');

        // Получить баланс из cookie
        function getBalanceFromCookie() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'miner_balance') {
                    return parseFloat(value) || 0;
                }
            }
            return 0;
        }

        // Сохранить баланс в cookie
        function setBalanceToCookie(value) {
            document.cookie = `miner_balance=${value}; path=/; max-age=31536000`; // 1 год
        }

        // Обновить состояние элементов управления
        function updateControls() {
            const hasBalance = balance >= 1;
            const shouldShowNoBalance = !hasBalance && !gameActive;
            
            noBalanceElement.style.display = shouldShowNoBalance ? 'block' : 'none';
            
            // Блокируем или разблокируем элементы управления
            betAmountInput.disabled = !hasBalance || gameActive;
            minBetButton.disabled = !hasBalance || gameActive;
            halfBetButton.disabled = !hasBalance || gameActive;
            doubleBetButton.disabled = !hasBalance || gameActive;
            maxBetButton.disabled = !hasBalance || gameActive;
            
            minesButtons.forEach(button => {
                button.disabled = !hasBalance || gameActive;
            });
            
            actionButton.disabled = !hasBalance || gameActive;
        }

        // Обновление интерфейса
        function updateUI() {
            balanceElement.textContent = balance.toFixed(2) + ' ₽';
            updateControls();
            
            // Обновляем максимальную ставку в инпуте
            betAmountInput.max = balance;
        }

        // Возврат на главную страницу
        function goBack() {
            window.location.href = "index.html";
        }

        // Инициализация игрового поля
        function initGameBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                const content = document.createElement('div');
                content.className = 'content';
                content.textContent = '?';
                cell.appendChild(content);
                
                cell.addEventListener('click', () => handleCellClick(i));
                gameBoard.appendChild(cell);
            }
        }

        // Настройка элементов управления
        function setupControls() {
            // Ограничение ввода до целых чисел
            betAmountInput.addEventListener('input', function() {
                let value = this.value;
                if (value.includes('.')) {
                    this.value = value.split('.')[0];
                }
                if (isNaN(this.value)) {
                    this.value = 1;
                }
                updateControls();
            });
            
            // Кнопки ставок
            minBetButton.addEventListener('click', () => {
                betAmountInput.value = '1';
                updateControls();
            });
            
            halfBetButton.addEventListener('click', () => {
                const current = parseInt(betAmountInput.value) || 0;
                const newValue = Math.max(1, Math.floor(current / 2));
                betAmountInput.value = newValue;
                updateControls();
            });
            
            doubleBetButton.addEventListener('click', () => {
                const current = parseInt(betAmountInput.value) || 0;
                const newValue = Math.min(balance, current * 2);
                betAmountInput.value = newValue;
                updateControls();
            });
            
            maxBetButton.addEventListener('click', () => {
                if (balance > 0) {
                    betAmountInput.value = balance;
                    updateControls();
                }
            });
            
            // Кнопки выбора количества мин
            minesButtons.forEach(button => {
                button.addEventListener('click', () => {
                    minesButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    minesCount = parseInt(button.dataset.mines);
                    updateMultipliersDisplay();
                    updateControls();
                });
            });
            
            // Кнопка действия
            actionButton.addEventListener('click', () => {
                if (gameActive) {
                    collectWinnings();
                } else {
                    startGame();
                }
            });
            
            // Обновляем отображение множителей
            updateMultipliersDisplay();
        }

        // Начало игры
        function startGame() {
            currentBet = parseInt(betAmountInput.value);
            
            if (isNaN(currentBet) || currentBet <= 0) {
                return;
            }
            
            if (currentBet < 1) {
                return;
            }
            
            if (currentBet > balance) {
                return;
            }
            
            // Снимаем ставку с баланса
            balance -= currentBet;
            setBalanceToCookie(balance);
            updateUI();
            
            // Генерируем позиции бомб
            generateBombs();
            
            // Сбрасываем игровые переменные
            revealedCells = 0;
            currentMultiplier = 1.0;
            multiplierHistory = [];
            
            // Обновляем интерфейс
            gameActive = true;
            actionButton.textContent = 'Сделайте ход';
            actionButton.disabled = true;
            
            // Очищаем поле
            initGameBoard();
            updateMultipliersDisplay();
            updateControls();
        }

        // Генерация позиций бомб
        function generateBombs() {
            bombPositions = [];
            while (bombPositions.length < minesCount) {
                const randomPos = Math.floor(Math.random() * 25);
                if (!bombPositions.includes(randomPos)) {
                    bombPositions.push(randomPos);
                }
            }
        }

        // Обработка клика по клетке
        function handleCellClick(index) {
            if (!gameActive) return;
            
            const cell = gameBoard.children[index];
            if (cell.classList.contains('revealed')) return;
            
            cell.classList.add('revealed');
            
            if (bombPositions.includes(index)) {
                // Нашли бомбу
                const content = cell.querySelector('.content');
                content.textContent = '💣';
                cell.classList.add('bomb');
                
                // Добавляем проигрыш в историю множителей
                markLastMultiplier('lose');
                endGame();
            } else {
                // Пустая клетка
                const content = cell.querySelector('.content');
                content.textContent = '💎';
                
                revealedCells++;
                
                // Проверяем, не открыты ли все безопасные клетки
                if (revealedCells === (25 - minesCount)) {
                    // Все безопасные клетки открыты - автоматический выигрыш
                    updateMultiplier();
                    collectWinnings();
                    return;
                }
                
                updateMultiplier();
                actionButton.disabled = false;
                actionButton.textContent = `Забрать ${(currentBet * currentMultiplier).toFixed(2)} ₽`;
            }
        }

        // Обновление множителя
        function updateMultiplier() {
            const totalCells = 25;
            const safeCells = totalCells - minesCount;
            const probability = (safeCells - revealedCells) / (totalCells - revealedCells);
            currentMultiplier = parseFloat((1 / probability).toFixed(2));
            
            updateMultipliersDisplay();
        }

        // Обновление отображения множителей
        function updateMultipliersDisplay() {
            multipliersTrack.innerHTML = '';
            multiplierHistory = [];
            
            const totalCells = 25;
            const safeCells = totalCells - minesCount;
            
            // Создаем элементы множителей (без последнего бесконечного)
            for (let i = 0; i < safeCells; i++) {
                const probability = (safeCells - i) / (totalCells - i);
                const multiplier = (1 / probability).toFixed(2);
                
                const multiplierElement = document.createElement('div');
                multiplierElement.className = 'multiplier';
                
                const valueElement = document.createElement('div');
                valueElement.className = 'multiplier-value';
                valueElement.textContent = `x${multiplier}`;
                
                const stepElement = document.createElement('div');
                stepElement.className = 'multiplier-step';
                stepElement.textContent = `Ход ${i+1}`;
                
                multiplierElement.appendChild(valueElement);
                multiplierElement.appendChild(stepElement);
                
                if (i === revealedCells) {
                    multiplierElement.classList.add('current');
                }
                
                multipliersTrack.appendChild(multiplierElement);
                multiplierHistory.push(multiplierElement);
            }
            
            // Прокручиваем к текущему множителю
            if (multiplierHistory[revealedCells]) {
                multiplierHistory[revealedCells].scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'center'
                });
            }
        }

        // Пометить последний множитель (победа/проигрыш)
        function markLastMultiplier(status) {
            const lastMultiplier = multiplierHistory[multiplierHistory.length - 1];
            if (lastMultiplier) {
                lastMultiplier.classList.add(status);
            }
        }

        // Забрать выигрыш
        function collectWinnings() {
            const winAmount = parseFloat((currentBet * currentMultiplier).toFixed(2));
            balance += winAmount;
            setBalanceToCookie(balance);
            updateUI();
            
            markLastMultiplier('win');
            endGame();
        }

        // Завершение игры
        function endGame() {
            gameActive = false;
            actionButton.textContent = 'Играть';
            
            // Показываем все мины
            bombPositions.forEach(pos => {
                const cell = gameBoard.children[pos];
                if (!cell.classList.contains('revealed')) {
                    const content = cell.querySelector('.content');
                    content.textContent = '💣';
                    cell.classList.add('bomb');
                }
            });
            
            updateControls();
        }

        // Инициализация игры
        function initGame() {
            // Загружаем баланс из cookie
            balance = getBalanceFromCookie();
            updateUI();
            
            initGameBoard();
            setupControls();
        }

        // Запуск игры при загрузке страницы
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
